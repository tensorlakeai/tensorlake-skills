# Maps each bundled reference snapshot to its upstream doc sources.
#
# Live docs at docs.tensorlake.ai are the primary source of truth (see
# references/feature_lookup.md and the skill's Documentation lookup
# section). The files under references/ are offline-fallback snapshots
# for use when network access is unavailable. The drift-check script
# fetches these URLs and compares against the local snapshot to surface
# divergence — divergence is expected over time and not a build break,
# but the staleness should be visible.
#
# feature_lookup.md is a curated index, not a doc-page snapshot, and
# therefore has no entry here.
#
# Fields:
#   sources       – doc pages consolidated into this reference file
#   sdk_version   – tensorlake SDK version the snapshot was written for
#   last_verified – date someone last confirmed the snapshot matches live docs

